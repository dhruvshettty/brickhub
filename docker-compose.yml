version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: brickhub
      POSTGRES_USER: brickhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brickhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://brickhub:${POSTGRES_PASSWORD}@db:5432/brickhub
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SUUNTO_CLIENT_ID: ${SUUNTO_CLIENT_ID:-}
      SUUNTO_CLIENT_SECRET: ${SUUNTO_CLIENT_SECRET:-}
      SUUNTO_REDIRECT_URI: ${SUUNTO_REDIRECT_URI:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-not-for-production}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
